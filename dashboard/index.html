<!doctype html>
<html class="dark" lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>通信観測ディスプレイ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/styles.css" />
    <script type="module" src="/src/main.js" defer></script>
  </head>
  <body>
    <div id="web-banner" class="web-banner" hidden>
      <p>
        デモ版です。下のボタンで操作を再現できます。本番展示では机のラズパイの実ボタンを使います。
      </p>
      <button id="simulate-button" class="simulate-button" type="button">
        状態確認（デモ）
      </button>
    </div>

    <nav class="top-nav">
      <div class="top-nav__status">
        <span id="stream-dot" class="status-dot waiting" aria-hidden="true"></span>
        <span id="stream-status" class="top-nav__status-text">待機中</span>
      </div>

      <div class="flow-map" aria-label="展示の流れ">
        <div class="flow-map__step flow-map__step--active" data-step="button">
          <span>ボタンを押す</span>
        </div>
        <span class="flow-map__arrow" aria-hidden="true">›</span>
        <div class="flow-map__step" data-step="flow">
          <span>通信が流れる</span>
        </div>
        <span class="flow-map__arrow" aria-hidden="true">›</span>
        <div class="flow-map__step" data-step="observe">
          <span>裏側で観察</span>
        </div>
        <span class="flow-map__arrow" aria-hidden="true">›</span>
        <div class="flow-map__step" data-step="display">
          <span>画面に表示</span>
        </div>
      </div>

      <button
        id="demo-toggle"
        class="demo-toggle"
        type="button"
        aria-pressed="false"
        title="デモデータ"
      >
        デモ
      </button>
    </nav>

    <main class="main-canvas">
      <section class="panel panel--left">
        <div class="metrics-header">
          <div>
            <h2 class="panel-label">現在の通信速度</h2>
            <div id="pps-value" class="pps-value">0</div>
          </div>
          <div class="metrics-total">
            <h3 class="panel-sublabel">累計通信数</h3>
            <div id="total-value" class="total-value">0</div>
          </div>
        </div>
        <div id="waterfall-container" class="waterfall" aria-label="通信の流れ"></div>
      </section>

      <section class="panel panel--right">
        <h2 class="panel-title">通信キャプチャ詳細</h2>

        <div class="detail-card">
          <h3 class="panel-sublabel">いま行われた操作</h3>
          <p id="current-action" class="current-action current-action--idle">
            ボタンを押すとここに表示されます
          </p>
        </div>

        <div class="detail-card">
          <h3 class="panel-sublabel">裏側で見えたデータ</h3>
          <div class="ip-pair">
            <span id="behind-src">—</span>
            <span class="ip-pair__arrow" aria-hidden="true">→</span>
            <span id="behind-dst">—</span>
          </div>
          <p id="behind-summary" class="behind-summary">
            操作に対応する通信がここに表示されます。
          </p>
        </div>

        <div class="flow-list-wrap">
          <div id="flow-list" class="flow-list"></div>
        </div>

        <div class="alert-wrap">
          <h3 class="panel-sublabel">レートアラート</h3>
          <div id="alert-log" class="alert-log"></div>
        </div>
      </section>
    </main>

    <div id="capture-toast" class="capture-toast" hidden aria-live="polite">
      <span class="capture-toast__icon" aria-hidden="true">✓</span>
      <p id="capture-toast-text" class="capture-toast__text"></p>
    </div>

    <div id="attack-flash" class="attack-flash" aria-hidden="true"></div>
  </body>
</html>
