name: Validate packet journey

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Test observation core
        run: cargo test --manifest-path observation-core/Cargo.toml
      - name: Test tools
        run: cargo test --manifest-path tools/Cargo.toml

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - name: Install
        working-directory: dashboard
        run: npm ci
      - name: Build
        working-directory: dashboard
        run: npm run build
      - name: Upload dashboard preview
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-preview
          path: dashboard/dist
          retention-days: 3

  xdp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - name: Install bpf-linker
        run: cargo install bpf-linker
      - name: Test shared XDP policy
        run: cargo test --manifest-path xdp-hello/Cargo.toml -p xdp-hello-common
      - name: Build XDP workspace
        run: cargo build --manifest-path xdp-hello/Cargo.toml
