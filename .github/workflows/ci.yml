name: Validate packet journey

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Test observation core
        run: cargo test --manifest-path observation-core/Cargo.toml
      - name: Test tools
        run: cargo test --manifest-path tools/Cargo.toml

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - name: Install
        working-directory: dashboard
        run: npm ci
      - name: Build
        working-directory: dashboard
        run: npm run build
